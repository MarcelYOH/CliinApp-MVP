name: cliinapp
description: "CliinApp — Application civic-tech de signalement d'insalubrité. Ville pilote : San-Pedro, Côte d'Ivoire."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  intl: ^0.19.0
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  web: ^1.1.1
  shared_preferences: ^2.3.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/app_icon.png"
  # Option adaptive_icon_background/foreground essayée puis retirée : le
  # foreground utilisait l'image complète (un carré arrondi, pas un motif
  # pensé pour un masque de sécurité circulaire) — Android appliquait son
  # propre masque circulaire par-dessus, aplatissant les bords et élargissant
  # la zone blanche visible aux coins. Sans configuration adaptative,
  # flutter_launcher_icons ne génère que l'icône legacy classique à partir
  # de l'image source telle quelle (déjà verte, coins arrondis, sans ajout
  # de bordure) — pas de masque OS supplémentaire à gérer.

flutter_localizations:
  sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - google_fonts/
