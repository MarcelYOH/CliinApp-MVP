name: cliinapp
description: "CliinApp — Application civic-tech de signalement d'insalubrité. Ville pilote : San-Pedro, Côte d'Ivoire."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  intl: ^0.19.0
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  web: ^1.1.1
  shared_preferences: ^2.3.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/app_icon.png"
  # L'icône source (rounded-square vert avec coins blancs/transparents en
  # dehors du carré arrondi) n'a pas de calque foreground séparé. Sans
  # adaptive_icon_background explicite, Android insère l'icône legacy dans
  # le canevas adaptatif 108dp avec une marge de sécurité — cette marge
  # apparaît alors en blanc (fond par défaut), d'où le liseré observé.
  # Fixer le fond à la même couleur verte que le logo (CliinAppColors.primary)
  # rend cette marge invisible : plus de transition visible avec l'icône.
  adaptive_icon_background: "#2DB84B"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter_localizations:
  sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - google_fonts/
